name: daily-update (manual fallback)

# 通常の日次更新は Google Cloud（Cloud Scheduler 08:10 JST → Cloud Run Job "banzuke-daily"）で実行する。
# このワークフローは手動の保険用。schedule / push トリガーは持たない
#（Cloud Run の main push でこのワークフローが誤起動しないようにするため）。
# GitHub Pages は gh-pages ブランチ配信に変更済みのため、deploy-pages は使わず gh-pages へ直接 push する。
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: banzuke-fallback
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 収集・集計
        run: |
          python3 scripts/scrape.py
          python3 scripts/fetch_logos.py
          python3 scripts/build_site_data.py

      - name: データを main へコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/banzuke_full.csv data/logos.json site/data.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "data: 手動更新 $(TZ=Asia/Tokyo date +%Y-%m-%d) [fallback]"
            git push
          fi

      - name: OGPカード・ページ生成
        run: |
          python3 -m pip install --quiet Pillow
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk
          python3 scripts/make_publisher_pages.py

      - name: site を gh-pages へ公開
        run: |
          cp -r site /tmp/pages
          cd /tmp/pages
          touch .nojekyll
          git init -q
          git checkout -q -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "deploy (manual fallback) $(TZ=Asia/Tokyo date +%Y-%m-%dT%H:%M)"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
